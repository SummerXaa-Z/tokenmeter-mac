# 显式指定链接器/编译器为系统真实工具，避免 PATH 中存在同名 `cc` 别名/包装脚本时
# 遮蔽 /usr/bin/cc，导致 Rust 链接与 cc-rs 编译 .m/.c 失败（exit status 1）。
# 若你的环境 cc 未被占用，此配置也无副作用。
[target.aarch64-apple-darwin]
linker = "/usr/bin/cc"

[target.x86_64-apple-darwin]
linker = "/usr/bin/cc"

# cc-rs 不读上面的 linker，它按 CC/CXX 环境变量或 PATH 找编译器，这里用 [env] 固化。
[env]
CC = "/usr/bin/cc"
CXX = "/usr/bin/c++"
