name: DeepSeekMonitor
options:
  bundleIdPrefix: com.deepseek.monitor
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "2.1.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.deepseek.monitor.mac
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    ENABLE_HARDENED_RUNTIME: "YES"

targets:
  DeepSeekMonitor:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: DeepSeek Monitor
        CFBundleName: DeepSeekMonitor
        CFBundleShortVersionString: "2.1.1"
        # 菜单栏应用：不进 Dock、不抢主菜单栏
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "MIT License. Ported from DeepSeekMonitorWindows."
        # 允许访问 DeepSeek HTTPS 接口（App Transport Security 默认即允许 HTTPS，此处留空表示用默认安全策略）
    entitlements:
      path: Sources/DeepSeekMonitor.entitlements
      properties:
        # 非沙盒：需要访问 ~/Library/LaunchAgents 写自启 plist、读 WKWebView 缓存
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
